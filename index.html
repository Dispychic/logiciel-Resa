<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dipsy - Restaurant Festif</title>
<style>
  :root {
    --cream:#f6efe3; --paper:rgba(255,252,246,.94); --ink:#18231d; --muted:#756f64;
    --green:#123729; --gold:#c8a464; --red:#b74735; --line:rgba(40,52,44,.15);
    --shadow:0 18px 50px rgba(18,35,29,.13);
  }
  *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(120deg,#f6efe3,#fffaf2)}
  button,input,select,textarea{font:inherit} button{border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .app{width:min(1120px,100%);margin:0 auto;padding:22px clamp(12px,3vw,28px) 34px}
  header{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:13px}
  .logo{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:var(--green);color:#fffaf1;font-family:Georgia,serif;font-size:25px;box-shadow:var(--shadow)}
  h1,h2,p{margin-top:0}h1{margin-bottom:3px;font-family:Georgia,serif;font-weight:500;font-size:clamp(27px,5vw,46px)}.sub{margin:0;color:var(--muted);font-weight:650}
  .date-pill,.btn,.chip,.toggle-btn,.card-toggle{border-radius:999px;border:1px solid var(--line);background:#fffdf8;color:var(--ink);font-weight:950}
  .date-pill{min-height:48px;padding:0 16px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{padding:15px;min-height:92px}.stat strong{display:block;font-family:Georgia,serif;font-size:38px;line-height:1;font-weight:500;margin-bottom:8px}.stat span{color:var(--muted);font-size:13px;font-weight:850}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:12px}.side-stack{display:grid;gap:12px;align-content:start}.form-panel,.tables-panel,.cards-panel{padding:18px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.panel-head h2{margin-bottom:0}.toggle-btn{min-height:42px;padding:0 14px;color:var(--green)}.collapsed .collapsible-body{display:none}
  h2{margin-bottom:12px;font-family:Georgia,serif;font-weight:500;font-size:28px}.field{display:grid;gap:6px;margin-bottom:12px}label{font-size:13px;font-weight:900;color:var(--green)}
  input,select,textarea{width:100%;min-height:52px;border-radius:8px;border:1px solid var(--line);background:#fffdf8;color:var(--ink);padding:0 13px;outline:0;font-size:16px}textarea{min-height:86px;padding-top:12px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(18,55,41,.12)}.btn{min-height:52px;padding:0 18px}.btn.primary{width:100%;background:var(--green);color:#fffaf1;border-color:var(--green)}.btn.red{color:var(--red)}
  .message,.sms{display:none;margin-bottom:12px;padding:12px;border-radius:8px;font-weight:900}.message.show,.sms.show{display:block}.message.ok{background:rgba(65,184,115,.18);color:#145f38}.message.err{background:rgba(183,71,53,.14);color:var(--red)}.sms{margin-top:12px;background:rgba(200,164,100,.18);color:var(--green)}
  .table-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.table{min-height:160px;border-radius:10px;padding:14px;text-align:left;background:#fffdf8;border:1px solid var(--line);color:var(--ink)}.table.booked{background:rgba(120,120,120,.18);color:var(--ink);border-color:rgba(120,120,120,.38)}.table.arrived{background:rgba(65,184,115,.28);color:var(--ink);border-color:rgba(65,184,115,.7)}
  .table-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:18px}.table-num{font-size:34px;line-height:1;font-weight:950}.pill{border-radius:999px;padding:6px 9px;background:rgba(200,164,100,.18);color:var(--gold);font-size:12px;font-weight:950;white-space:nowrap}.table.booked .pill{background:rgba(120,120,120,.14);color:#555}.table.arrived .pill{background:rgba(18,55,41,.12);color:var(--green)}
  .client{font-size:18px;font-weight:950;margin-bottom:6px}.details{color:inherit;opacity:.78;font-size:13px;font-weight:750;line-height:1.5}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.actions .btn{min-height:42px;padding:0 12px;font-size:13px}
  .tools{display:grid;grid-template-columns:minmax(180px,1fr) auto;gap:10px;margin-bottom:12px}.consult-summary{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}.mini-stat{display:inline-flex;align-items:center;gap:6px;min-height:36px;padding:0 12px;border-radius:999px;border:1px solid var(--line);background:#fffdf8;color:var(--green);font-weight:950}.mini-stat strong{font-family:inherit;font-size:14px;line-height:1;font-weight:950;margin:0}.mini-stat span{color:var(--muted);font-size:12px;font-weight:900}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{min-height:44px;padding:0 14px}.chip.active{background:var(--green);border-color:var(--green);color:#fffaf1}
  .booking-list{display:grid;gap:10px}.booking-card{display:grid;gap:12px;padding:14px;border-radius:10px;border:1px solid rgba(120,120,120,.34);background:rgba(120,120,120,.13)}.booking-card.arrived-card{background:rgba(65,184,115,.18);border-color:rgba(65,184,115,.62)}.booking-card.cancelled-card{background:rgba(183,71,53,.15);border-color:rgba(183,71,53,.55)}
  .booking-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}.booking-title strong{font-size:19px}.card-toggle{margin-left:auto;min-height:34px;padding:0 11px;color:var(--green);font-size:12px}.booking-main{display:grid;gap:12px}.card-collapsed .booking-main{display:none}.card-collapsed .booking-title{margin-bottom:0}
  .booking-meta{color:var(--muted);font-size:14px;font-weight:750;line-height:1.55}.edit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.note-box{min-height:108px}.empty{padding:18px;border-radius:10px;border:1px dashed var(--line);color:var(--muted);font-weight:900;text-align:center;background:rgba(255,253,248,.7)}
  @media(max-width:900px){header{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.table-grid{grid-template-columns:repeat(3,1fr)}.tools,.edit-grid{grid-template-columns:1fr}}
  @media(max-width:560px){.app{padding:14px 10px 24px}.stats,.table-grid{grid-template-columns:repeat(2,1fr)}.stat strong{font-size:32px}.table{min-height:145px}.table-num{font-size:30px}}

  /* Theme nuit */
  body{background:#030504;color:#f7f1e6}
  :root{--paper:rgba(12,16,14,.94);--ink:#f7f1e6;--muted:#c7bda9;--green:#37c77a;--gold:#d7b56d;--red:#ff7868;--line:rgba(255,255,255,.16);--shadow:0 18px 50px rgba(0,0,0,.46)}
  .panel{background:#1b211e;border-color:rgba(255,255,255,.2)}
  .logo{background:#0f2b20;color:#f7f1e6;box-shadow:0 0 0 1px rgba(215,181,109,.22),var(--shadow)}
  .date-pill,.btn,.chip,.toggle-btn,.card-toggle,input,select,textarea{background:#242b27;color:#f7f1e6;border-color:rgba(255,255,255,.22)}
  input::placeholder,textarea::placeholder{color:rgba(247,241,230,.45)}
  label,.toggle-btn,.card-toggle,.mini-stat{color:#8ee0ae}
  input:focus,select:focus,textarea:focus{border-color:#8ee0ae;box-shadow:0 0 0 4px rgba(142,224,174,.14)}
  .btn.primary,.chip.active{background:#1f7a4f;color:#fff;border-color:#37c77a}
  .btn.red{color:#ff8a7d}
  .stat span,.mini-stat span,.booking-meta,.sub{color:#c7bda9}
  .mini-stat,.pill{background:#29302b;border-color:rgba(255,255,255,.2);color:#e4c47b}
  .table{background:#222824;border-color:rgba(255,255,255,.2);color:#f7f1e6}
  .table.booked{background:#343936;color:#f7f1e6;border-color:rgba(220,220,220,.28)}
  .table.booked .pill{background:rgba(255,255,255,.08);color:#d8d2c6}
  .table.arrived{background:rgba(55,199,122,.24);color:#f7f1e6;border-color:rgba(55,199,122,.58)}
  .table.arrived .pill{background:rgba(55,199,122,.18);color:#9cf0ba}
  .booking-card{background:#2a302c;border-color:rgba(220,220,220,.24);color:#f7f1e6}
  .booking-card.arrived-card{background:rgba(55,199,122,.2);border-color:rgba(55,199,122,.52)}
  .booking-card.cancelled-card{background:rgba(255,120,104,.17);border-color:rgba(255,120,104,.5)}
  .message.ok{background:rgba(55,199,122,.2);color:#b8ffd0}.message.err{background:rgba(255,120,104,.17);color:#ffb4aa}.sms{background:rgba(215,181,109,.16);color:#f3d99b}
  .empty{background:#242b27;border-color:rgba(255,255,255,.18);color:#c7bda9}



  /* Force version noire */
  html,body{background:#030504!important;color:#f7f1e6!important}
  .panel{background:#1b211e!important;border-color:rgba(255,255,255,.2)!important}
  .date-pill,.btn,.chip,.toggle-btn,.card-toggle,input,select,textarea{background:#242b27!important;color:#f7f1e6!important;border-color:rgba(255,255,255,.22)!important}
  .mini-stat,.pill{background:#29302b!important;border-color:rgba(255,255,255,.2)!important;color:#e4c47b!important}
  .table{background:#222824!important;border-color:rgba(255,255,255,.2)!important;color:#f7f1e6!important}
  .table.booked{background:#343936!important;color:#f7f1e6!important;border-color:rgba(220,220,220,.28)!important}
  .booking-card{background:#2a302c!important;border-color:rgba(220,220,220,.24)!important;color:#f7f1e6!important}
  .booking-card.arrived-card,.table.arrived{background:rgba(55,199,122,.24)!important;border-color:rgba(55,199,122,.58)!important;color:#f7f1e6!important}
  .booking-card.cancelled-card{background:rgba(255,120,104,.17)!important;border-color:rgba(255,120,104,.5)!important}

</style>
</head>
<body>
<main class="app">
  <header><div class="brand"><div class="logo">D</div><div><h1>Dipsy Réservations</h1><p class="sub">Restaurant festif · dîner · club</p></div></div><input id="dateInput" class="date-pill" type="date"></header>
  <section class="stats"><div class="stat panel"><strong id="totalReservations">0</strong><span>Réservations</span></div><div class="stat panel"><strong id="totalPeople">0</strong><span>Personnes</span></div><div class="stat panel"><strong id="totalTables">0</strong><span>Tables prises</span></div><div class="stat panel"><strong id="totalArrived">0</strong><span>Personnes arrivées</span></div></section>
  <section class="layout"><div class="side-stack">
    <form id="bookingForm" class="form-panel panel" autocomplete="off"><div class="panel-head"><h2>Nouvelle réservation</h2><button class="toggle-btn" type="button" data-toggle="bookingForm">Réduire</button></div><div class="collapsible-body"><div id="message" class="message"></div><div class="field"><label for="name">Nom du client</label><input id="name" required placeholder="Ex: Cohen Sarah"></div><div class="field"><label for="phone">Téléphone</label><input id="phone" required inputmode="tel" placeholder="06..."></div><div class="field"><label for="people">Nombre de personnes</label><select id="people"></select></div><div class="field"><label for="type">Type</label><select id="type"><option>Dîner</option><option>Dîner + Club</option><option>Club</option></select></div><div class="field"><label for="table">Table</label><select id="table"></select></div><div class="field"><label for="note">Note</label><textarea id="note" placeholder="Anniversaire, préférence, acompte..."></textarea></div><button class="btn primary" type="submit">Ajouter la réservation</button><div id="smsInfo" class="sms"></div></div></form>
    <section id="consultPanel" class="cards-panel panel"><div class="panel-head"><h2>Consulter réservations</h2><button class="toggle-btn" type="button" data-toggle="consultPanel">Réduire</button></div><div class="collapsible-body"><div class="tools"><input id="search" type="search" placeholder="Rechercher nom, téléphone, table, note"><div id="filters" class="chips"></div></div><div id="consultSummary" class="consult-summary"></div><div id="bookingList" class="booking-list"></div></div></section>
  </div><section class="tables-panel panel"><h2>Plan des 12 tables</h2><div id="tables" class="table-grid"></div></section></section>
</main>
<script>
  const STORAGE_KEY="dipsy-simple-festif-v1", SMS_PHONE="0668844322", TABLES=Array.from({length:12},(_,i)=>i+1), TYPES=["Dîner","Dîner + Club","Club"];
  const $=(s)=>document.querySelector(s); let data=loadData(), currentDate=todayKey(), activeFilter="Tous"; const collapsedCards=new Set();
  function todayKey(){const n=new Date(),o=n.getTimezoneOffset();return new Date(n.getTime()-o*60000).toISOString().slice(0,10)}
  function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return {}}}
  function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
  function dayBookings(){if(!data[currentDate])data[currentDate]=[];return data[currentDate]}
  function escapeHtml(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
  function peopleOptions(selected=""){return Array.from({length:12},(_,i)=>{const v=String(i+1);return `<option value="${v}" ${String(selected)===v?"selected":""}>${v} personne${Number(v)>1?"s":""}</option>`}).join("")}
  function tableOptions(selected=""){return TABLES.map(t=>`<option value="${t}" ${String(selected)===String(t)?"selected":""}>Table ${t}</option>`).join("")}
  function typeOptions(selected=""){return TYPES.map(t=>`<option ${String(selected)===t?"selected":""}>${t}</option>`).join("")}
  function fillSelects(){$("#people").innerHTML=peopleOptions();$("#table").innerHTML=tableOptions()}
  function showMessage(text,type){$("#message").textContent=text;$("#message").className=`message show ${type}`;setTimeout(()=>$("#message").classList.remove("show"),3800)}
  function isCancelled(b){return Boolean(b.cancelled)}
  function tableIsTaken(table){return dayBookings().some(b=>!isCancelled(b)&&Number(b.table)===Number(table))}
  function tableIsTakenByOther(table,id){return dayBookings().some(b=>b.id!==id&&!isCancelled(b)&&Number(b.table)===Number(table))}
  function filteredBookings(){const q=$("#search").value.trim().toLowerCase();return dayBookings().filter(b=>activeFilter==="Tous"||b.type===activeFilter).filter(b=>!q||[b.name,b.phone,b.table,b.type,b.note].some(v=>String(v||"").toLowerCase().includes(q)))}
  function renderStats(){const active=dayBookings().filter(b=>!isCancelled(b));$("#totalReservations").textContent=dayBookings().length;$("#totalPeople").textContent=active.reduce((t,b)=>t+Number(b.people),0);$("#totalTables").textContent=active.length;$("#totalArrived").textContent=active.filter(b=>b.arrived).reduce((t,b)=>t+Number(b.people),0)}
  function renderTables(){const active=dayBookings().filter(b=>!isCancelled(b));$("#tables").innerHTML=TABLES.map(t=>{const b=active.find(x=>Number(x.table)===t);if(!b)return `<article class="table"><div class="table-top"><div class="table-num">${t}</div><span class="pill">Libre</span></div><div class="client">Table disponible</div><div class="details">Aucune réservation</div></article>`;return `<article class="table ${b.arrived?"arrived":"booked"}"><div class="table-top"><div class="table-num">${t}</div><span class="pill">${b.arrived?"Arrivé":"Réservé"}</span></div><div class="client">${escapeHtml(b.name)}</div><div class="details">${b.people} pers · ${escapeHtml(b.type)}<br>${escapeHtml(b.phone)}<br>${escapeHtml(b.note||"Aucune note")}</div><div class="actions"><button class="btn" data-action="arrived" data-id="${b.id}">Client arrivé</button><button class="btn red" data-action="delete" data-id="${b.id}">Supprimer</button></div></article>`}).join("")}
  function renderFilters(){const fs=["Tous",...TYPES];$("#filters").innerHTML=fs.map(t=>`<button class="chip ${activeFilter===t?"active":""}" data-filter="${t}">${t}</button>`).join("")}
  function renderBookingList(){const bs=filteredBookings();const active=bs.filter(b=>!isCancelled(b));const arrived=active.filter(b=>b.arrived);$("#consultSummary").innerHTML=`<div class="mini-stat"><strong>${new Set(active.map(b=>String(b.table))).size}</strong><span>Tables en résa</span></div><div class="mini-stat"><strong>${new Set(arrived.map(b=>String(b.table))).size}</strong><span>Tables arrivées</span></div><div class="mini-stat"><strong>${active.reduce((t,b)=>t+Number(b.people),0)}</strong><span>Pers total</span></div><div class="mini-stat"><strong>${arrived.reduce((t,b)=>t+Number(b.people),0)}</strong><span>Pers arrivées</span></div>`;$("#bookingList").innerHTML=bs.length?bs.map(b=>{const c=collapsedCards.has(b.id);return `<article class="booking-card ${isCancelled(b)?"cancelled-card":b.arrived?"arrived-card":""} ${c?"card-collapsed":""}"><div class="booking-title"><strong>${escapeHtml(b.name)}</strong><span class="pill">Table ${b.table}</span><span class="pill">${escapeHtml(b.type)}</span><span class="pill">${isCancelled(b)?"Annulée":b.arrived?"Arrivé":"Réservé"}</span><button class="card-toggle" data-action="toggle-card" data-id="${b.id}">${c?"Agrandir":"Réduire"}</button></div><div class="booking-main"><div class="booking-meta">${b.people} personne${Number(b.people)>1?"s":""} · ${escapeHtml(b.phone)}<br>Note actuelle : ${escapeHtml(b.note||"Aucune note")}</div><div class="edit-grid"><div class="field"><label>Nom</label><input data-edit-id="${b.id}" data-edit-field="name" value="${escapeHtml(b.name)}"></div><div class="field"><label>Téléphone</label><input data-edit-id="${b.id}" data-edit-field="phone" inputmode="tel" value="${escapeHtml(b.phone)}"></div><div class="field"><label>Personnes</label><select data-edit-id="${b.id}" data-edit-field="people">${peopleOptions(b.people)}</select></div><div class="field"><label>Type</label><select data-edit-id="${b.id}" data-edit-field="type">${typeOptions(b.type)}</select></div><div class="field"><label>Table</label><select data-edit-id="${b.id}" data-edit-field="table">${tableOptions(b.table)}</select></div></div><div class="actions"><button class="btn" data-action="arrived" data-id="${b.id}">Client arrivé</button><button class="btn red" data-action="cancel" data-id="${b.id}">Annuler la table</button><button class="btn red" data-action="delete" data-id="${b.id}">Supprimer</button></div><div><label>Note de la fiche</label><textarea class="note-box" data-note-id="${b.id}" placeholder="Ajouter une note...">${escapeHtml(b.note||"")}</textarea></div></div></article>`}).join(""):`<div class="empty">Aucune fiche pour cette sélection.</div>`}
  function render(){ $("#dateInput").value=currentDate; renderFilters(); renderStats(); renderTables(); renderBookingList(); saveData() }
  function addBooking(e){e.preventDefault();const b={id:crypto.randomUUID(),name:$("#name").value.trim(),phone:$("#phone").value.trim(),people:$("#people").value,type:$("#type").value,table:$("#table").value,note:$("#note").value.trim(),arrived:false,cancelled:false};if(tableIsTaken(b.table)){showMessage(`La table ${b.table} est déjà réservée pour cette date.`,"err");return}dayBookings().push(b);$("#bookingForm").reset();showMessage(`Réservation ajoutée table ${b.table}.`,"ok");render()}
  function markArrived(b){if(isCancelled(b))return;b.arrived=true;render();const sms=`Client arrivé : ${b.name} - ${b.people} personnes - table ${b.table} - ${b.type}`;$("#smsInfo").textContent=`SMS préparé pour ${SMS_PHONE} : ${sms}`;$("#smsInfo").classList.add("show");setTimeout(()=>{window.location.href=`sms:${SMS_PHONE}?body=${encodeURIComponent(sms)}`},120)}
  function handleBookingAction(e){const btn=e.target.closest("[data-action]");if(!btn)return;const b=dayBookings().find(x=>x.id===btn.dataset.id);if(!b)return;if(btn.dataset.action==="toggle-card"){collapsedCards.has(b.id)?collapsedCards.delete(b.id):collapsedCards.add(b.id);renderBookingList()}if(btn.dataset.action==="arrived")markArrived(b);if(btn.dataset.action==="cancel"){b.cancelled=true;b.arrived=false;render()}if(btn.dataset.action==="delete"){data[currentDate]=dayBookings().filter(x=>x.id!==b.id);render()}}
  function updateBookingField(target){const b=dayBookings().find(x=>x.id===target.dataset.editId||x.id===target.dataset.noteId);if(!b)return;if(target.dataset.noteId)b.note=target.value;else{const f=target.dataset.editField;if(f==="table"&&!isCancelled(b)&&tableIsTakenByOther(target.value,b.id)){alert(`La table ${target.value} est déjà réservée.`);target.value=b.table;return}b[f]=target.value}renderTables();renderStats();saveData()}
  $("#bookingForm").addEventListener("submit",addBooking);$("#dateInput").addEventListener("change",()=>{currentDate=$("#dateInput").value||todayKey();render()});$("#tables").addEventListener("click",handleBookingAction);$("#bookingList").addEventListener("click",handleBookingAction);$("#bookingList").addEventListener("input",e=>{const el=e.target.closest("[data-edit-id], [data-note-id]");if(el)updateBookingField(el)});$("#bookingList").addEventListener("change",e=>{const el=e.target.closest("[data-edit-id]");if(el)updateBookingField(el)});$("#filters").addEventListener("click",e=>{const chip=e.target.closest("[data-filter]");if(!chip)return;activeFilter=chip.dataset.filter;render()});$("#search").addEventListener("input",renderBookingList);document.querySelectorAll("[data-toggle]").forEach(btn=>btn.addEventListener("click",()=>{const p=document.getElementById(btn.dataset.toggle);p.classList.toggle("collapsed");btn.textContent=p.classList.contains("collapsed")?"Ouvrir":"Réduire"}));
  fillSelects();render();
</script>
</body>
</html>
