<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dispychico - Plan de table</title>
<style>
:root{color-scheme:dark;--bg:#030504;--card:#1b211e;--field:#242b27;--soft:#2a302c;--muted:#c7bda9;--text:#f7f1e6;--line:rgba(255,255,255,.2);--gold:#e4c47b;--green:#37c77a;--red:#ff7868;--shadow:0 18px 50px rgba(0,0,0,.42);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer;color:inherit}.app{width:min(1180px,100%);margin:auto;padding:22px clamp(12px,3vw,28px) 36px}
header{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:#0f2b20;color:#fff;font-family:Georgia,serif;font-size:25px;box-shadow:var(--shadow)}h1,h2,p{margin-top:0}h1{font-family:Georgia,serif;font-weight:500;font-size:clamp(28px,5vw,46px);margin-bottom:3px}.sub{margin:0;color:var(--muted);font-weight:700}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill-control,.btn,.chip,.toggle,.mini,.card-toggle,input,select,textarea{background:var(--field);color:var(--text);border:1px solid var(--line);border-radius:999px;font-weight:900}.pill-control{min-height:48px;padding:0 14px}.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{min-height:88px}.stat strong{display:block;font:500 36px/1 Georgia,serif;margin-bottom:8px}.stat span{color:var(--muted);font-size:13px;font-weight:850}
.layout{display:grid;grid-template-columns:390px 1fr;gap:12px}.side{display:grid;gap:12px;align-content:start}.head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.head h2{margin:0;font-family:Georgia,serif;font-weight:500;font-size:27px}.toggle{min-height:40px;padding:0 13px;color:var(--gold)}.collapsed .body{display:none}
.field{display:grid;gap:6px;margin-bottom:11px}label{font-size:13px;color:var(--gold);font-weight:900}input,select,textarea{width:100%;min-height:50px;border-radius:8px;padding:0 12px}textarea{min-height:82px;padding-top:11px;resize:vertical}.btn{min-height:48px;padding:0 16px}.btn.primary{width:100%;background:#1f7a4f;border-color:var(--green);color:#fff}.btn.red{color:#ff9a8f}.message,.sms{display:none;border-radius:8px;padding:11px;margin-bottom:10px;font-weight:900}.show{display:block}.ok{background:rgba(55,199,122,.2);color:#b8ffd0}.err{background:rgba(255,120,104,.17);color:#ffc1ba}.sms{background:rgba(228,196,123,.16);color:#f3d99b;margin-top:11px}
.table-tools{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}.table-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.table{min-height:150px;background:#222824;border:1px solid var(--line);border-radius:10px;padding:13px}.table.booked{background:#343936}.table.arrived{background:rgba(55,199,122,.24);border-color:rgba(55,199,122,.58)}.table-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:16px}.table-num{font-size:33px;font-weight:950;line-height:1}.tag{display:inline-flex;align-items:center;min-height:28px;padding:0 9px;border-radius:999px;background:#29302b;border:1px solid var(--line);color:var(--gold);font-size:12px;font-weight:950}.client{font-size:17px;font-weight:950;margin-bottom:5px}.details{color:var(--muted);font-size:13px;font-weight:750;line-height:1.5}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.actions .btn{min-height:40px;font-size:13px;padding:0 11px}
.tools{display:grid;grid-template-columns:minmax(160px,1fr) auto;gap:8px;margin-bottom:10px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{min-height:42px;padding:0 13px}.chip.active{background:#1f7a4f;border-color:var(--green);color:#fff}.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.mini{display:inline-flex;align-items:center;gap:6px;min-height:35px;padding:0 11px;color:var(--gold)}.mini span{color:var(--muted);font-size:12px}
.booking-list{display:grid;gap:10px}.booking-card{background:var(--soft);border:1px solid rgba(220,220,220,.24);border-radius:10px;padding:13px}.booking-card.arrived{background:rgba(55,199,122,.2);border-color:rgba(55,199,122,.52)}.booking-card.cancelled{background:rgba(255,120,104,.17);border-color:rgba(255,120,104,.5)}.booking-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}.booking-title strong{font-size:18px}.card-toggle{margin-left:auto;min-height:32px;padding:0 10px;color:var(--gold);font-size:12px}.card-body{display:grid;gap:10px}.booking-card.fold .card-body{display:none}.booking-card.fold .booking-title{margin-bottom:0}.edit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.empty{padding:18px;border-radius:10px;border:1px dashed var(--line);color:var(--muted);font-weight:900;text-align:center;background:var(--field)}
.history-panel{display:none;margin-top:12px}.history-panel.open{display:block}.history-date{margin:14px 0 8px;color:var(--gold);font-weight:950}.history-grid{display:grid;gap:8px}.history-entry{background:#222824;border:1px solid var(--line);border-radius:10px;padding:11px}.history-entry strong{display:block;margin-bottom:4px}.history-entry span{color:var(--muted);font-size:13px}.history-entry.cancelled{background:rgba(255,120,104,.13)}.history-entry.arrived{background:rgba(55,199,122,.16)}
@media(max-width:900px){header{align-items:flex-start;flex-direction:column}.top-actions{justify-content:flex-start}.stats{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.table-grid{grid-template-columns:repeat(3,1fr)}.tools,.edit-grid{grid-template-columns:1fr}}@media(max-width:560px){.stats,.table-grid{grid-template-columns:repeat(2,1fr)}.app{padding:14px 10px 24px}}
</style>
</head>
<body>
<main class="app">
<header><div class="brand"><div class="logo">D</div><div><h1>Dispychico</h1><p class="sub">Restaurant festif · plan de table · historique</p></div></div><div class="top-actions"><select id="profile" class="pill-control"><option>Steven</option><option>Naty</option></select><input id="date" class="pill-control" type="date"></div></header>
<section class="stats"><div class="stat panel"><strong id="statRes">0</strong><span>Réservations</span></div><div class="stat panel"><strong id="statPeople">0</strong><span>Personnes</span></div><div class="stat panel"><strong id="statTables">0</strong><span>Tables prises</span></div><div class="stat panel"><strong id="statArrived">0</strong><span>Pers arrivées</span></div></section>
<section class="layout"><div class="side">
<form id="form" class="panel"><div class="head"><h2>Nouvelle réservation</h2><button type="button" class="toggle" data-toggle="form">Réduire</button></div><div class="body"><div id="msg" class="message"></div><div class="field"><label>Nom</label><input id="name" required placeholder="Nom prénom"></div><div class="field"><label>Téléphone</label><input id="phone" inputmode="tel" required placeholder="06..."></div><div class="field"><label>Personnes</label><select id="people"></select></div><div class="field"><label>Type</label><select id="type"><option>Dîner</option><option>Table</option><option>Dîner & Table</option></select></div><div class="field"><label>Table</label><select id="table"></select></div><div class="field"><label>Note</label><textarea id="note" placeholder="Note..."></textarea></div><button class="btn primary">Ajouter</button><div id="sms" class="sms"></div></div></form>
<section id="consult" class="panel"><div class="head"><h2>Consulter réservations</h2><button type="button" class="toggle" data-toggle="consult">Réduire</button></div><div class="body"><div class="tools"><input id="search" type="search" placeholder="Rechercher"><div id="filters" class="chips"></div></div><div id="summary" class="summary"></div><div id="bookingList" class="booking-list"></div></div></section>
</div><section class="panel"><div class="table-tools"><h2>Plan de table</h2><button id="historyBtn" class="btn" type="button">Historique plan de table</button></div><div id="tables" class="table-grid"></div><div id="historyPanel" class="history-panel"><h2>Historique plan de table</h2><div id="historyContent"></div></div></section></section>
</main>
<script>
const STORAGE_KEY="dipsy-simple-festif-v1",HISTORY_KEY="dispychico-plan-history-v1",PROFILE_KEY="dispychico-profile-v1",SMS_PHONE="0668844322";
const TABLES=Array.from({length:12},(_,i)=>i+1),TABLE_PAX={1:8,2:4,3:4,4:6,5:6,6:4,7:8,8:4,9:2,10:2,11:6,12:8},TYPES=["Dîner","Table","Dîner & Table"],$=s=>document.querySelector(s);
let data=load(STORAGE_KEY,{}),history=load(HISTORY_KEY,{}),currentDate=today(),filter="Tous";const folded=new Set();
function today(){const d=new Date(),o=d.getTimezoneOffset();return new Date(d.getTime()-o*60000).toISOString().slice(0,10)}
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));localStorage.setItem(HISTORY_KEY,JSON.stringify(history));localStorage.setItem(PROFILE_KEY,$("#profile").value)}
function day(){if(!data[currentDate])data[currentDate]=[];return data[currentDate]}function dayHist(){if(!history[currentDate])history[currentDate]=[];return history[currentDate]}
function html(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function stamp(){return new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}
function displayDate(d=currentDate){const [y,m,da]=d.split("-");return `${da}/${m}/${y}`}function tableLabel(t){return `TABLE ${t} (${TABLE_PAX[t]||"?"} PAX)`}function statusOf(b){return b.cancelled?"Annulé":b.arrived?"Présent":b.validated?"Validé":"En attente"}function active(b){return !b.cancelled&&!b.deleted}
function addHistory(action,b,details=""){const e={id:crypto.randomUUID(),date:currentDate,stamp:stamp(),profile:$("#profile").value,action,details,bookingId:b?.id||"",table:b?.table||"",name:b?.name||"",people:b?.people||"",type:b?.type||"",status:b?statusOf(b):""};dayHist().unshift(e);save()}
function opts(n,sel=""){return Array.from({length:n},(_,i)=>`<option value="${i+1}" ${String(sel)===String(i+1)?"selected":""}>${i+1}</option>`).join("")}
function tableOpts(sel=""){return TABLES.map(t=>`<option value="${t}" ${String(sel)===String(t)?"selected":""}>${tableLabel(t)}</option>`).join("")}function typeOpts(sel=""){return TYPES.map(t=>`<option ${sel===t?"selected":""}>${t}</option>`).join("")}
function taken(table,id=""){return day().some(b=>b.id!==id&&active(b)&&Number(b.table)===Number(table))}
function filtered(){const q=$("#search").value.trim().toLowerCase();return day().filter(b=>filter==="Tous"||b.type===filter).filter(b=>!q||[b.name,b.phone,b.table,b.type,b.note,statusOf(b)].some(v=>String(v||"").toLowerCase().includes(q)))}
function renderStats(){const a=day().filter(active);$("#statRes").textContent=day().length;$("#statPeople").textContent=a.reduce((s,b)=>s+Number(b.people),0);$("#statTables").textContent=new Set(a.map(b=>String(b.table))).size;$("#statArrived").textContent=a.filter(b=>b.arrived).reduce((s,b)=>s+Number(b.people),0)}
function renderTables(){const a=day().filter(active);$("#tables").innerHTML=TABLES.map(t=>{const b=a.find(x=>Number(x.table)===t);if(!b)return `<article class="table"><div class="table-top"><div class="table-num">TABLE ${t}</div><span class="tag">${TABLE_PAX[t]} PAX</span></div><div class="client">Libre</div><div class="details">Aucune réservation</div></article>`;return `<article class="table ${b.arrived?"arrived":"booked"}"><div class="table-top"><div class="table-num">TABLE ${t}</div><span class="tag">${TABLE_PAX[t]} PAX</span></div><div class="client">${html(b.name)}</div><div class="details">${b.people} pers · ${html(b.type)} · ${b.arrived?"Présent":"Réservé"}<br>${html(b.phone||"")}<br>${html(b.note||"Aucune note")}</div><div class="actions"><button class="btn" data-act="arrived" data-id="${b.id}">Client arrivé</button><button class="btn" data-act="validated" data-id="${b.id}">Validé</button></div></article>`}).join("")}
function renderFilters(){const all=["Tous",...TYPES];$("#filters").innerHTML=all.map(t=>`<button class="chip ${filter===t?"active":""}" data-filter="${t}">${t}</button>`).join("")}
function renderBookings(){const bs=filtered(),a=bs.filter(active),arr=a.filter(b=>b.arrived);$("#summary").innerHTML=`<span class="mini"><b>${new Set(a.map(b=>String(b.table))).size}</b><span>Tables en résa</span></span><span class="mini"><b>${new Set(arr.map(b=>String(b.table))).size}</b><span>Tables arrivées</span></span><span class="mini"><b>${a.reduce((s,b)=>s+Number(b.people),0)}</b><span>Pers total</span></span><span class="mini"><b>${arr.reduce((s,b)=>s+Number(b.people),0)}</b><span>Pers arrivées</span></span>`;$("#bookingList").innerHTML=bs.length?bs.map(b=>{const f=folded.has(b.id);return `<article class="booking-card ${b.cancelled?"cancelled":b.arrived?"arrived":""} ${f?"fold":""}"><div class="booking-title"><strong>${html(b.name)}</strong><span class="tag">${tableLabel(b.table)}</span><span class="tag">${html(b.type)}</span><span class="tag">${statusOf(b)}</span><button class="card-toggle" data-act="fold" data-id="${b.id}">${f?"Agrandir":"Réduire"}</button></div><div class="card-body"><div class="edit-grid"><div class="field"><label>Nom</label><input data-edit="${b.id}" data-field="name" value="${html(b.name)}"></div><div class="field"><label>Téléphone</label><input data-edit="${b.id}" data-field="phone" value="${html(b.phone||"")}"></div><div class="field"><label>Personnes</label><select data-edit="${b.id}" data-field="people">${opts(12,b.people)}</select></div><div class="field"><label>Type</label><select data-edit="${b.id}" data-field="type">${typeOpts(b.type)}</select></div><div class="field"><label>Table</label><select data-edit="${b.id}" data-field="table">${tableOpts(b.table)}</select></div></div><div class="actions"><button class="btn" data-act="arrived" data-id="${b.id}">Client arrivé</button><button class="btn" data-act="validated" data-id="${b.id}">Validé</button><button class="btn red" data-act="cancel" data-id="${b.id}">Annuler</button><button class="btn red" data-act="delete" data-id="${b.id}">Supprimer</button></div><div class="field"><label>Note</label><textarea data-note="${b.id}">${html(b.note||"")}</textarea></div></div></article>`}).join(""):`<div class="empty">Aucune fiche.</div>`}
function renderHistory(){const groups=Object.keys(history).sort().reverse();$("#historyContent").innerHTML=groups.length?groups.map(d=>`<div class="history-date">${displayDate(d)}</div><div class="history-grid">${history[d].map(e=>`<article class="history-entry ${e.status==="Présent"?"arrived":e.status==="Annulé"?"cancelled":""}"><strong>${html(e.table?tableLabel(e.table):"Action")}</strong><span>${html(e.name||"")} ${e.people?`· ${e.people} pers`:""} ${e.type?`· ${e.type}`:""} ${e.status?`· ${e.status}`:""}</span><br><span>${html(e.stamp)} · ${html(e.profile)} : ${html(e.details||e.action)}</span></article>`).join("")}</div>`).join(""):`<div class="empty">Aucun historique.</div>`}
function seedHistory(){day().forEach(b=>{if(!dayHist().some(e=>e.bookingId===b.id)){dayHist().push({id:crypto.randomUUID(),date:currentDate,stamp:stamp(),profile:$("#profile").value,action:"état initial",details:"État initial du plan",bookingId:b.id,table:b.table,name:b.name,people:b.people,type:b.type,status:statusOf(b)})}})}
function render(){ $("#date").value=currentDate;seedHistory();renderStats();renderTables();renderFilters();renderBookings();renderHistory();save()}
function msg(t,c){$("#msg").textContent=t;$("#msg").className=`message show ${c}`;setTimeout(()=>$("#msg").classList.remove("show"),3500)}
$("#people").innerHTML=opts(12);$("#table").innerHTML=tableOpts();$("#profile").value=localStorage.getItem(PROFILE_KEY)||"Steven";$("#date").value=currentDate;
$("#form").addEventListener("submit",e=>{e.preventDefault();const b={id:crypto.randomUUID(),name:$("#name").value.trim(),phone:$("#phone").value.trim(),people:$("#people").value,type:$("#type").value,table:$("#table").value,note:$("#note").value.trim(),arrived:false,validated:false,cancelled:false};if(taken(b.table)){msg(`Table ${b.table} déjà prise.`,"err");return}day().push(b);addHistory("création",b,`Réservation créée TABLE ${b.table}`);$("#form").reset();msg("Réservation ajoutée.","ok");render()});
function find(id){return day().find(b=>b.id===id)}function act(action,id){const b=find(id);if(!b)return;if(action==="fold"){folded.has(id)?folded.delete(id):folded.add(id);renderBookings();return}if(action==="arrived"){b.arrived=true;b.validated=true;addHistory("arrivée",b,"Client marqué présent");const sms=`Client arrivé : ${b.name} - ${b.people} personnes - table ${b.table} - ${b.type}`;$("#sms").textContent=`SMS préparé pour ${SMS_PHONE} : ${sms}`;$("#sms").classList.add("show");setTimeout(()=>location.href=`sms:${SMS_PHONE}?body=${encodeURIComponent(sms)}`,120)}if(action==="validated"){b.validated=true;addHistory("validation",b,"Réservation validée")}if(action==="cancel"){b.cancelled=true;b.arrived=false;addHistory("annulation",b,"Réservation annulée")}if(action==="delete"){b.deleted=true;addHistory("suppression",b,"Réservation supprimée");data[currentDate]=day().filter(x=>x.id!==id)}render()}
document.body.addEventListener("click",e=>{const a=e.target.closest("[data-act]");if(a)act(a.dataset.act,a.dataset.id);const f=e.target.closest("[data-filter]");if(f){filter=f.dataset.filter;render()}const t=e.target.closest("[data-toggle]");if(t){const p=document.getElementById(t.dataset.toggle);p.classList.toggle("collapsed");t.textContent=p.classList.contains("collapsed")?"Ouvrir":"Réduire"}})
$("#bookingList").addEventListener("input",e=>{const n=e.target.closest("[data-note]");if(n){const b=find(n.dataset.note);if(b){b.note=n.value;addHistory("modification",b,"Note modifiée");renderTables();save()}}const ed=e.target.closest("[data-edit]");if(ed&&ed.tagName==="INPUT"){const b=find(ed.dataset.edit);if(b){b[ed.dataset.field]=ed.value;addHistory("modification",b,`${ed.dataset.field} modifié`);renderTables();renderStats();save()}}})
$("#bookingList").addEventListener("change",e=>{const ed=e.target.closest("[data-edit]");if(!ed)return;const b=find(ed.dataset.edit);if(!b)return;const field=ed.dataset.field,old=b[field];if(field==="table"&&taken(ed.value,b.id)){alert(`Table ${ed.value} déjà prise.`);ed.value=old;return}b[field]=ed.value;addHistory("modification",b,field==="table"?`TABLE ${old} → déplacée vers TABLE ${ed.value}`:`${field} modifié`);render()})
$("#date").addEventListener("change",()=>{currentDate=$("#date").value||today();render()});$("#profile").addEventListener("change",save);$("#search").addEventListener("input",renderBookings);$("#historyBtn").addEventListener("click",()=>$("#historyPanel").classList.toggle("open"));
render();
</script>
</body>
</html>
